global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: url-shortener-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - web:5000
          - web2:5000
