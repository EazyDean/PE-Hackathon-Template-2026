x-app-environment: &app-environment
  APP_HOST: 0.0.0.0
  APP_PORT: 5000
  FLASK_DEBUG: "false"
  AUTO_CREATE_TABLES: "true"
  AUTO_LOAD_SEED_DATA: "false"
  RESET_DATABASE_ON_STARTUP: "false"
  CACHE_ENABLED: ${CACHE_ENABLED:-true}
  CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
  REDIS_URL: redis://redis:6379/0
  REDIS_TIMEOUT_SECONDS: ${REDIS_TIMEOUT_SECONDS:-0.5}
  DATABASE_NAME: ${DATABASE_NAME:-hackathon_db}
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_USER: ${DATABASE_USER:-postgres}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      web2:
        condition: service_healthy
    ports:
      - "5000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  web:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *app-environment
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web2:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *app-environment
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-hackathon_db}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-hackathon_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
